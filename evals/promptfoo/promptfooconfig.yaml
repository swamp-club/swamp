    assert:
      - type: javascript
        value: |-
          const toolCalls = (context.prompt?.raw || '').includes('tool_use') ? [] : [];
          try {
            const calls = JSON.parse(output);
            if (Array.isArray(calls)) {
              return calls.some(c => c.function?.name === 'swamp-data' || c.name === 'swamp-data');
            }
          } catch {}
          return String(output).includes('"swamp-data"');
