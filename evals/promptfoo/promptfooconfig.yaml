description: Swamp skill trigger routing evaluation (sonnet)
prompts:
  - "{{query}}"
providers:
  - id: "anthropic:messages:claude-sonnet-4-5"
    config:
      temperature: 0
      max_tokens: 200
      systemMessage: >-
        You are a skill router for swamp, an AI-native automation framework. Your ONLY job is to route user requests to the correct skill by making a tool call. You MUST call exactly one tool for
        every request. NEVER respond with text. NEVER ask clarifying questions. Even if the request is vague or missing details, route it to the best-matching skill based on the topic and keywords.
        The skill itself will handle gathering any missing information from the user.
      tools:
        - type: function
          function:
            name: swamp-data
            description: >-
              Manage swamp model data — list data artifacts, view version history, delete expired versions, and run garbage collection. Use when working with swamp model data lifecycle, retention
              policies, or version cleanup. Triggers on "swamp data", "model data", "data list", "data get", "data versions", "garbage collection", "gc", "data gc", "data retention", "data lifecycle",
              "version history", "data cleanup", "prune data", "expire data", "ephemeral data".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-extension-datastore
            description: >-
              Create user-defined TypeScript datastores for swamp — implement DatastoreProvider, configure locking, health checks, and optional sync. Use when users want to extend swamp with custom
              datastore backends. Triggers on "custom datastore", "extension datastore", "DatastoreProvider", "extensions/datastores", "create datastore", "new datastore type", "datastore plugin",
              "datastore implementation".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-extension-driver
            description: >-
              Create user-defined TypeScript execution drivers for swamp — implement ExecutionDriver to control where and how model methods run. Use when users want custom execution environments
              (remote servers, cloud functions, custom containers). Triggers on "custom driver", "extension driver", "execution driver", "ExecutionDriver", "extensions/drivers", "create driver", "new
              driver type", "driver plugin", "remote execution", "driver implementation".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-extension-model
            description: >-
              Create, test, and publish extension models for swamp — define Zod schemas, implement model interfaces, smoke test against live APIs, write manifest.yaml, and push extensions to the
              registry. Use when creating models, writing manifest.yaml, publishing/pushing extensions, testing extensions, or preparing models for the registry. Covers all extension types (models,
              vaults, drivers, datastores, reports). Triggers on "create model", "new model type", "custom model", "extension model", "user model", "typescript model", "extend swamp", "build
              integration", "zod schema", "model plugin", "deno model", "extensions/models", "model development", "implement model", "smoke test", "test extension", "verify model", "test against API",
              "before push test", "push extension", "publish extension", "extension push", "release extension", "bump version", "publish to registry", "test extension from another repo", "source
              extension loading", "manifest", "manifest.yaml", "write manifest", "prepare for publishing".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-extension-vault
            description: >-
              Create user-defined TypeScript vaults for swamp — implement VaultProvider to securely store and retrieve secrets. Use when users want to extend swamp with custom vault backends. Triggers
              on "custom vault", "extension vault", "VaultProvider", "extensions/vaults", "create vault", "new vault type", "vault plugin", "vault implementation", "user-defined vault", "vault
              provider".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-issue
            description: >-
              Create GitHub issues for swamp — file bug reports with reproduction steps or submit feature requests with implementation context. Use when the user wants to report a bug, request a
              feature, or provide feedback about swamp. Triggers on "bug report", "feature request", "report bug", "request feature", "file bug", "submit bug", "swamp bug", "swamp feature",
              "feedback", "report issue", "file issue".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-model
            description: >
              Work with existing swamp models — structured automation units that define typed schemas, methods (validate, transform, enrich), and outputs for data processing. Use when searching for
              model types, describing schemas, creating inputs, running or executing methods, viewing outputs, or managing lifecycle (edit, delete). Do NOT use when the user wants to build, create, or
              implement a custom model type, Zod schema, or TypeScript model — that is swamp-extension-model. Triggers on "swamp model", "model type", "model schema", "create input", "type search",
              "type describe", "run method", "execute method", "validation method", "transform method", "enrichment model", "model validate", "model delete", "model edit", "model output", "output
              logs", "output format", "CEL expression".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-repo
            description: >-
              Manage swamp repositories, datastores, and extension sources — initializing repos, upgrading swamp, syncing data, releasing stuck locks, loading extensions from external paths, and
              installing swamp in CI. Use when initializing repos, upgrading swamp, starting the webapp, configuring datastores, managing extension sources, or setting up swamp in CI/CD pipelines.
              Triggers on "repo", "repository", "init", "initialize", "swamp init", "setup swamp", "new swamp project", "upgrade swamp", "webapp", "swamp webapp", "repository structure", ".swamp
              folder", "datastore", "datastore setup", "datastore status", "datastore sync", "datastore lock", "s3 datastore", "filesystem datastore", "stuck lock", "lock release", "install swamp",
              "CI", "CI/CD", "GitHub Actions", "install in CI", "setup CI", "extension source", "extension sources", ".swamp-sources.yaml", "load extensions from", "local extension source", "add
              source", "source add", "source rm", "source list".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-report
            description: >-
              Create, register, configure, and run reports for swamp models and workflows. Use when creating report extensions, configuring reports in definition YAML, running reports via CLI, or
              viewing report output. Triggers on "report", "swamp report", "model report", "create report", "run report", "report extension", "report label", "skip report", "report output", "cost
              report", "audit report", "workflow report", "report results".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-troubleshooting
            description: >
              Navigate swamp source code to trace error origins, identify execution flows, inspect internal data structures, and understand CLI behavior when --help is insufficient. Use this skill
              whenever something is broken ("error", "failing", "not working", "crash", "timeout", "bug", "fix", "debug", "troubleshoot", "root cause", "stack trace", "isn't being found", "giving me
              an error", "slow", "performance", "latency") OR when you need to understand how swamp works internally ("how does", "what happens when", "where is", "internals", "under the hood").
              Applies even when the query mentions a specific domain (e.g., "vault expressions aren't resolving" or "how does extension push work") — fetch swamp source to find the answer.
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-vault
            description: >-
              Manage swamp vaults for secure secret storage. Use when creating vaults, storing secrets, retrieving secrets, listing vault keys, or working with vault expressions in workflows. Triggers
              on "vault", "secret", "secrets", "swamp vault", "store secret", "get secret", "vault expression", "aws secrets manager", "credential storage", "user-defined vault", "custom vault",
              "vault implementation", "extensions/vaults", "vault provider", or vault-related CLI commands.
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
        - type: function
          function:
            name: swamp-workflow
            description: >-
              Work with swamp workflows for AI-native automation — define jobs and steps in YAML, wire models together with dependencies, validate DAGs, and inspect run history. Use when searching for
              workflows, creating new workflows, validating workflow definitions, running workflows, or viewing run history. Triggers on "swamp workflow", "run workflow", "create workflow",
              "automate", "automation", "orchestrate", "run history", "execute workflow", "workflow logs", "workflow failure", "debug workflow".
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: The user's request to process
              required:
                - query
tests:
  - description: "[swamp-data] SHOULD trigger: Show me all the model data currently stored in swamp"
    vars:
