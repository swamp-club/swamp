id: test-aws-secrets-manager-vault
name: test-aws-secrets-manager-vault
description: Test AWS Secrets Manager vault functionality by storing, retrieving, and echoing a secret
version: 1

jobs:
  - name: aws-vault-test-flow
    description: Complete AWS vault test flow - store secret, retrieve it, then echo the result
    steps:
      - name: store-aws-secret
        description: Store a test secret in AWS Secrets Manager
        task:
          type: model_method
          modelIdOrName: store-aws-test-secret
          methodName: put

      - name: retrieve-aws-secret
        description: Retrieve the stored secret from AWS Secrets Manager
        task:
          type: model_method
          modelIdOrName: get-aws-test-secret
          methodName: get

      - name: echo-aws-retrieved-value
        description: Echo the retrieved AWS secret to verify it worked
        task:
          type: model_method
          modelIdOrName: echo-aws-secret-result
          methodName: write
