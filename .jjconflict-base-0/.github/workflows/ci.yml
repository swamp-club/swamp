name: CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: write
  id-token: write

jobs:
  test:
    name: Lint, Test, and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run deno lint
        run: deno lint

      - name: Run deno fmt --check
        run: deno fmt --check

      - name: Run deno test
        run: deno test --allow-read --allow-write --allow-env --allow-run --allow-net

  claude-review:
    # NOTE: For this to block merges, enable branch protection on main with:
    # "Require a pull request before merging" + "Require approving reviews"
    # Claude will use --request-changes to block or --approve to allow
    name: Claude Code Review
    needs: test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Claude environment
        run: |
          mkdir -p ~/.claude
          # Exclude experiments folder from Claude's view
          echo 'experiments/' > .claudeignore

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            First, read CLAUDE.md to understand the project's code style and requirements.
            Then use the `ddd` skill to review code for domain-driven design principles.

            Review this PR for:
            1. Code quality and adherence to the project's TypeScript strict mode requirements
            2. Compliance with the code style guidelines in CLAUDE.md (named exports, no any types, etc.)
            3. Domain-driven design principles (use the ddd skill)
            4. Test coverage (unit tests should live next to source files)
            5. Security vulnerabilities and best practices
            6. Any potential bugs or edge cases

            IMPORTANT: Categorize your findings into two types:
            - **Blocking Issues**: Problems that MUST be fixed before merge (bugs, security issues, type errors, missing tests for new code, violations of CLAUDE.md requirements)
            - **Suggestions**: Nice-to-have improvements that don't block merge (style preferences, optional refactoring, documentation improvements)

            After reviewing, submit your review using ONE of these commands:

            If there are NO blocking issues (only suggestions or the PR looks good):
            ```
            gh pr review ${{ github.event.pull_request.number }} --approve --body "your review here"
            ```

            If there ARE blocking issues that must be addressed:
            ```
            gh pr review ${{ github.event.pull_request.number }} --request-changes --body "your review here"
            ```

            Your review body should clearly list any blocking issues at the top, followed by suggestions.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-opus-4-5-20251101
            --allowedTools Read,Glob,Grep,Bash(gh pr review:*),Bash(gh pr view:*),Bash(gh pr diff:*)

  auto-merge:
    name: Auto-merge PR
    needs: [test, claude-review]
    runs-on: ubuntu-latest
    # Only auto-merge PRs from the same repo (not forks) for security
    # Skip auto-merge if PR has the 'hold' label
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'hold')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable auto-merge
        run: gh pr merge --auto --squash --delete-branch "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.UAT_TRIGGER_TOKEN }}
