name: CI

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: write
  id-token: write

jobs:
  test:
    name: Lint, Test, and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run deno lint
        run: deno lint

      - name: Run deno fmt --check
        run: deno fmt --check

      - name: Run deno test
        run: deno test --allow-read --allow-write --allow-env --allow-run

  claude-review:
    name: Claude Code Review
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for:
            1. Code quality and adherence to the project's TypeScript strict mode requirements
            2. Compliance with the code style guidelines in CLAUDE.md (named exports, no any types, etc.)
            3. Domain-driven design principles
            4. Test coverage (unit tests should live next to source files)
            5. Security vulnerabilities and best practices
            6. Any potential bugs or edge cases

            After reviewing, post your feedback as a comment on the PR using:
            gh pr comment ${{ github.event.pull_request.number }} --body "your review here"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-opus-4-5-20251101
            --allowedTools Bash(gh pr comment:*),Bash(gh pr view:*)

  auto-merge:
    name: Auto-merge PR
    needs: [test, claude-review]
    runs-on: ubuntu-latest
    # Only auto-merge PRs from the same repo (not forks) for security
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_NUMBER"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
