<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWAMP CLUB — About Us</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Chakra Petch', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.12) 0px,
      rgba(0, 0, 0, 0.12) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  /* Flicker animation for CRT feel */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  .container {
    width: 100%;
    max-width: 900px;
    padding: 60px 30px;
    animation: flicker 8s infinite;
  }

  .header {
    text-align: center;
    margin-bottom: 60px;
  }

  .header h2 {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 400;
    font-size: 0.9rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #555;
  }

  .founder-row {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-bottom: 20px;
    padding: 20px 0;
    position: relative;
  }

  .founder-row::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(57, 255, 20, 0.2) 30%, rgba(57, 255, 20, 0.2) 70%, transparent);
  }

  .founder-row:last-child::after {
    display: none;
  }

  /* Large letter — matches swamp.club homepage neon green + glitch */
  .letter-wrap {
    position: relative;
    width: clamp(90px, 16vw, 160px);
    flex-shrink: 0;
    text-align: center;
    user-select: none;
  }

  .letter {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(80px, 15vw, 140px);
    line-height: 1;
    background: linear-gradient(
      180deg,
      #5bc8c8 0%,
      #5bc8c8 30%,
      #8be8a0 40%,
      #8be8a0 55%,
      #c878a8 65%,
      #c878a8 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
  }

  /* Glitch layers — cyan and magenta offsets like the homepage */
  .letter-wrap .glitch-cyan,
  .letter-wrap .glitch-pink {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(80px, 15vw, 140px);
    line-height: 1;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    background: linear-gradient(180deg, #5bc8c8 0%, #5bc8c8 30%, #8be8a0 40%, #8be8a0 55%, #c878a8 65%, #c878a8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .letter-wrap .glitch-cyan {
    filter: hue-rotate(-30deg) brightness(1.3);
    transform: translate(3px, 0);
  }

  .letter-wrap .glitch-pink {
    filter: hue-rotate(30deg) brightness(1.3);
    transform: translate(-3px, 0);
  }

  /* Show glitch on row hover */
  .founder-row:hover .glitch-cyan,
  .founder-row:hover .glitch-pink {
    opacity: 0.7;
    animation: glitch-skew 0.3s ease;
  }

  @keyframes glitch-skew {
    0% { transform: translate(0) skewX(0); }
    20% { transform: translate(-3px, 2px) skewX(-2deg); }
    40% { transform: translate(3px, -2px) skewX(2deg); }
    60% { transform: translate(-2px, -1px) skewX(-1deg); }
    80% { transform: translate(2px, 1px) skewX(1deg); }
    100% { transform: translate(0) skewX(0); }
  }

  .founder-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .founder-name {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    color: #22d3ee;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(34, 211, 238, 0.4);
    text-decoration: none;
    transition: color 0.2s, text-shadow 0.2s;
  }

  .founder-name:hover {
    color: #67e8f9;
    text-shadow: 0 0 12px rgba(34, 211, 238, 0.6);
  }

  .founder-handle {
    font-family: 'Chakra Petch', monospace;
    font-weight: 400;
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    -webkit-text-fill-color: transparent;
    background: linear-gradient(90deg, #fff, #22d3ee, #fff, #a78bfa, #fff) 0 0 / 200%;
    -webkit-background-clip: text;
    background-clip: text;
    animation: tier-origin-shimmer 3s linear infinite;
    text-shadow: 0 0 6px rgba(255, 255, 255, 0.38);
    text-decoration: none;
  }

  @keyframes tier-origin-shimmer {
    0% { background-position: 0%; }
    to { background-position: 200%; }
  }

  .social-links {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .social-links a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    color: #556;
    transition: color 0.3s, filter 0.3s;
  }

  .social-links a:hover {
    color: #39ff14;
    filter: drop-shadow(0 0 6px rgba(57, 255, 20, 0.5));
  }

  .social-links svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  /* Ambient glow behind the whole block */
  .container::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(57, 255, 20, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: -1;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .founder-row {
      flex-direction: column;
      text-align: center;
      gap: 8px;
    }
    .founder-info {
      align-items: center;
    }
    .name-row {
      justify-content: center;
    }
    .letter-wrap {
      width: auto;
    }
  }
</style>
