name: Multi-Model Skill Trigger Eval

on:
  schedule:
    # Run every Saturday at 08:00 UTC
    - cron: "0 8 * * 6"
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated model aliases to evaluate (or 'all')"
        required: false
        default: "all"

jobs:
  eval:
    name: Eval (${{ matrix.model }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: sonnet
            concurrency: 20
          - model: opus
            concurrency: 20
          - model: gpt-5.4
            concurrency: 1
          - model: gemini-2.5-pro
            concurrency: 20
    steps:
      - name: Check if model is selected
        id: check
        run: |
          MODELS="${{ github.event.inputs.models || 'all' }}"
          if [ "$MODELS" = "all" ] || echo ",$MODELS," | grep -q ",${{ matrix.model }},"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v6

      - name: Setup Deno
        if: steps.check.outputs.run == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.x

      - name: Setup Node.js
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run skill trigger evals
        if: steps.check.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: deno run eval-skill-triggers --model ${{ matrix.model }} --concurrency ${{ matrix.concurrency }}

      - name: Upload eval results
        if: steps.check.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v6
        with:
          name: eval-results-${{ matrix.model }}
          path: evals/promptfoo/results.json
          retention-days: 14

  analysis:
    name: Cross-Model Analysis
    runs-on: ubuntu-latest
    needs: eval
    if: always()
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.x

      - name: Download all eval results
        uses: actions/download-artifact@v4
        with:
          pattern: eval-results-*
          path: eval-artifacts

      - name: Run cross-model analysis
        run: deno run --allow-read --allow-env=GITHUB_STEP_SUMMARY --allow-write scripts/analyze_eval_results.ts eval-artifacts
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
