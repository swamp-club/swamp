name: Workflow Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  validate-workflows:
    name: Validate GitHub Actions Workflows
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq for YAML validation
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Validate YAML syntax
        run: |
          echo "=== Validating YAML Syntax ==="
          
          YAML_ERROR=0
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [[ -f "$file" ]]; then
              echo "Checking YAML syntax: $file"
              if yq eval '.' "$file" > /dev/null 2>&1; then
                echo "✓ Valid YAML: $file"
              else
                echo "✗ Invalid YAML: $file"
                yq eval '.' "$file" 2>&1 || true
                YAML_ERROR=1
              fi
            fi
          done
          
          if [ $YAML_ERROR -eq 1 ]; then
            echo "❌ YAML syntax validation failed"
            exit 1
          else
            echo "✅ All workflow files have valid YAML syntax"
          fi

      - name: Validate GitHub Actions workflow structure
        run: |
          echo "=== Validating GitHub Actions Workflow Structure ==="
          
          WORKFLOW_ERROR=0
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [[ -f "$file" ]]; then
              echo "Validating workflow structure: $file"
              
              # Check required top-level fields
              if ! yq eval 'has("name")' "$file" | grep -q true; then
                echo "✗ Missing required 'name' field in $file"
                WORKFLOW_ERROR=1
              fi
              
              if ! yq eval 'has("on")' "$file" | grep -q true; then
                echo "✗ Missing required 'on' field in $file"
                WORKFLOW_ERROR=1
              fi
              
              if ! yq eval 'has("jobs")' "$file" | grep -q true; then
                echo "✗ Missing required 'jobs' field in $file"
                WORKFLOW_ERROR=1
              fi
              
              # Check that jobs have required fields
              job_names=$(yq eval '.jobs | keys | .[]' "$file" 2>/dev/null || echo "")
              if [ -n "$job_names" ]; then
                while IFS= read -r job_name; do
                  if [ -n "$job_name" ]; then
                    echo "  Checking job: $job_name"
                    
                    # Check runs-on field
                    if ! yq eval ".jobs.$job_name | has(\"runs-on\")" "$file" | grep -q true; then
                      echo "  ✗ Job '$job_name' missing required 'runs-on' field in $file"
                      WORKFLOW_ERROR=1
                    fi
                    
                    # Check steps field
                    if ! yq eval ".jobs.$job_name | has(\"steps\")" "$file" | grep -q true; then
                      echo "  ✗ Job '$job_name' missing required 'steps' field in $file"
                      WORKFLOW_ERROR=1
                    fi
                  fi
                done <<< "$job_names"
              fi
              
              if [ $WORKFLOW_ERROR -eq 0 ]; then
                echo "✓ Valid workflow structure: $file"
              fi
            fi
          done
          
          if [ $WORKFLOW_ERROR -eq 1 ]; then
            echo "❌ Workflow structure validation failed"
            exit 1
          else
            echo "✅ All workflows have valid structure"
          fi

      - name: Check for common workflow issues
        run: |
          echo "=== Checking for Common Workflow Issues ==="
          
          ISSUES_FOUND=0
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [[ -f "$file" ]]; then
              echo "Checking for common issues: $file"
              
              # Check for deprecated actions
              if grep -q "actions/checkout@v[12]" "$file"; then
                echo "  ⚠️ Warning: Using outdated checkout action in $file"
                echo "  Consider updating to actions/checkout@v4"
              fi
              
              if grep -q "actions/setup-node@v[12]" "$file"; then
                echo "  ⚠️ Warning: Using outdated setup-node action in $file"
                echo "  Consider updating to actions/setup-node@v4"
              fi
              
              # Check for missing permissions
              if ! yq eval 'has("permissions")' "$file" | grep -q true; then
                echo "  ⚠️ Warning: No permissions specified in $file"
                echo "  Consider adding explicit permissions for security"
              fi
              
              # Check for hardcoded secrets in workflow
              if grep -i "password\|secret\|token" "$file" | grep -v '\${{' | grep -v "secrets\." | grep -v "GITHUB_TOKEN"; then
                echo "  ⚠️ Warning: Potential hardcoded secrets found in $file"
                ISSUES_FOUND=1
              fi
              
              # Check for shell injection risks
              if grep -E '\$\{[^}]*\}' "$file" | grep -v '\$\{\{'; then
                echo "  ⚠️ Warning: Potential shell injection risk with unescaped variables in $file"
              fi
              
              echo "✓ Common issues check completed for: $file"
            fi
          done
          
          if [ $ISSUES_FOUND -eq 0 ]; then
            echo "✅ No critical issues found in workflow files"
          else
            echo "❌ Some issues found that should be addressed"
            # Don't fail the build for warnings, just report them
          fi

      - name: Validate workflow triggers and events
        run: |
          echo "=== Validating Workflow Triggers ==="
          
          TRIGGER_ERROR=0
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [[ -f "$file" ]]; then
              echo "Checking triggers: $file"
              
              # Get workflow name
              workflow_name=$(yq eval '.name' "$file")
              echo "  Workflow: $workflow_name"
              
              # Check trigger configuration
              trigger_types=$(yq eval '.on | keys | .[]' "$file" 2>/dev/null || echo "")
              if [ -n "$trigger_types" ]; then
                echo "  Triggers found: $(echo "$trigger_types" | tr '\n' ' ')"
                
                # Warn about workflow_dispatch for better debugging
                if ! echo "$trigger_types" | grep -q "workflow_dispatch"; then
                  echo "  ℹ️ Info: Consider adding workflow_dispatch for manual testing"
                fi
                
                # Check for conflicting triggers
                if echo "$trigger_types" | grep -q "push" && echo "$trigger_types" | grep -q "pull_request"; then
                  echo "  ⚠️ Warning: Both push and pull_request triggers found"
                  echo "  This may cause workflows to run twice on PR updates"
                fi
              else
                echo "  ✗ No valid triggers found"
                TRIGGER_ERROR=1
              fi
              
              echo "✓ Trigger validation completed for: $file"
            fi
          done
          
          if [ $TRIGGER_ERROR -eq 1 ]; then
            echo "❌ Trigger validation failed"
            exit 1
          else
            echo "✅ All workflows have valid triggers"
          fi

      - name: Generate workflow summary
        run: |
          echo "=== Workflow Validation Summary ==="
          
          total_workflows=$(find .github/workflows -name "*.yml" -o -name "*.yaml" | wc -l)
          echo "Total workflows found: $total_workflows"
          
          echo ""
          echo "Workflow files:"
          for file in .github/workflows/*.yml .github/workflows/*.yaml; do
            if [[ -f "$file" ]]; then
              workflow_name=$(yq eval '.name' "$file" 2>/dev/null || echo "Unknown")
              echo "  - $(basename "$file"): $workflow_name"
            fi
          done
          
          echo ""
          echo "✅ All GitHub Actions workflows are valid and properly configured"